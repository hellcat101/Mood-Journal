{% extends "base.html" %}
{% block title %}Log Your Mood · Moodly{% endblock %}

{% block content %}
<section class="hero">
  <p class="hero-eyebrow">How are you feeling?</p>
  <h1 class="hero-title">Tell me about<br /><em>your day.</em></h1>
</section>

<section class="mood-form-section">
  <div class="mood-picker">
    {% for mood, emoji in moods.items() %}
    <button
      type="button"
      class="mood-btn"
      data-mood="{{ mood }}"
      data-emoji="{{ emoji }}"
      aria-label="{{ mood }}"
    >
      <span class="mood-emoji">{{ emoji }}</span>
      <span class="mood-label">{{ mood }}</span>
    </button>
    {% endfor %}
  </div>

  <div class="note-section" id="noteSection" style="display:none">
    <textarea
      id="noteInput"
      class="note-input"
      placeholder="Add a note about your day… (optional)"
      rows="3"
      maxlength="500"
    ></textarea>
    <div class="char-count"><span id="charCount">0</span>/500</div>
    <button type="button" class="submit-btn" id="submitBtn">
      Save entry <span class="submit-arrow">→</span>
    </button>
  </div>

  <div class="toast" id="toast"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/log.js') }}"></script>
{% endblock %}
